<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🦊fº×X̌ƴ♊️🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Tenor+Sans&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --rose: #FF4D8B;
    --violet: #9B59B6;
    --teal: #00E5CC;
    --dark: #0a0010;
    --card: rgba(255,255,255,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--dark);
    font-family: 'Outfit', sans-serif;
    overflow-x: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }

  /* Animated starfield */
  #stars-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* Animated gradient BG */
  .bg-gradient {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(155,89,182,0.35) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(255,77,139,0.3) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(0,229,204,0.12) 0%, transparent 70%),
                #0a0010;
    animation: bgPulse 8s ease-in-out infinite alternate;
  }
  @keyframes bgPulse {
    0% { filter: brightness(1); }
    100% { filter: brightness(1.15); }
  }

  /* Floating confetti */
  .confetti-wrap {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .confetti-piece {
    position: absolute;
    top: -30px;
    width: 10px; height: 14px;
    border-radius: 2px;
    opacity: 0.85;
    animation: confettiFall linear infinite;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(-30px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Main wrapper */
  .page-wrap {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 520px;
    padding: 40px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  /* TOP RIBBON */
  .top-ribbon {
    width: 100%;
    text-align: center;
    animation: fadeDown 1s ease both;
  }
  .ribbon-text {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(10px, 3.2vw, 13px);
    letter-spacing: 0.28em;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0.8;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* PHOTO CARD */
  .photo-card {
    position: relative;
    width: 220px; height: 220px;
    animation: fadeIn 1.2s ease 0.3s both;
  }

  .photo-ring {
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    background: conic-gradient(
      var(--gold), var(--rose), var(--violet), var(--teal), var(--gold)
    );
    animation: ringRotate 4s linear infinite;
    z-index: 0;
  }
  @keyframes ringRotate {
    to { transform: rotate(360deg); }
  }

  .photo-ring-mask {
    position: absolute;
    inset: 4px;
    background: var(--dark);
    border-radius: 50%;
    z-index: 1;
  }

  .photo-img {
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    object-fit: cover;
    z-index: 2;
    width: calc(100% - 16px);
    height: calc(100% - 16px);
  }

  /* Floating emojis around photo */
  .float-emoji {
    position: absolute;
    font-size: 22px;
    z-index: 3;
    animation: floatOrbit 3s ease-in-out infinite alternate;
  }
  .fe1 { top: -15px; left: 50%; transform: translateX(-50%); animation-delay: 0s; }
  .fe2 { top: 50%; right: -18px; transform: translateY(-50%); animation-delay: 0.5s; }
  .fe3 { bottom: -15px; left: 50%; transform: translateX(-50%); animation-delay: 1s; }
  .fe4 { top: 50%; left: -18px; transform: translateY(-50%); animation-delay: 1.5s; }

  @keyframes floatOrbit {
    0%   { transform: translateY(0) scale(1); }
    100% { transform: translateY(-8px) scale(1.2); }
  }
  .fe1 { animation: floatUp 3s ease-in-out infinite alternate; }
  @keyframes floatUp {
    0%   { transform: translateX(-50%) translateY(0); }
    100% { transform: translateX(-50%) translateY(-10px); }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* NAME BLOCK */
  .name-block {
    text-align: center;
    animation: fadeIn 1s ease 0.6s both;
  }
  .host-label {
    font-family: 'Tenor Sans', serif;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--teal);
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.75;
  }
  .host-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(20px, 6vw, 28px);
    background: linear-gradient(135deg, var(--gold) 0%, var(--rose) 50%, var(--violet) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    filter: drop-shadow(0 0 18px rgba(255,215,0,0.4));
    animation: nameGlow 2.5s ease-in-out infinite alternate;
  }
  @keyframes nameGlow {
    0%   { filter: drop-shadow(0 0 14px rgba(255,215,0,0.4)); }
    100% { filter: drop-shadow(0 0 30px rgba(255,77,139,0.7)); }
  }

  /* ID BADGE */
  .id-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 22px;
    border: 1px solid rgba(255,215,0,0.25);
    border-radius: 40px;
    background: rgba(255,215,0,0.07);
    backdrop-filter: blur(8px);
    animation: fadeIn 1s ease 0.9s both;
    margin-top: 2px;
  }
  .id-badge-label {
    font-family: 'Tenor Sans', serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--gold);
    opacity: 0.6;
    text-transform: uppercase;
  }
  .id-badge-value {
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.1em;
  }

  /* BIRTHDAY MAIN CARD */
  .bday-card {
    width: 100%;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 24px;
    padding: 32px 28px;
    text-align: center;
    backdrop-filter: blur(16px);
    animation: fadeIn 1s ease 1.1s both;
    position: relative;
    overflow: hidden;
  }
  .bday-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,77,139,0.06), rgba(0,229,204,0.04));
    pointer-events: none;
  }

  .bday-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(26px, 8vw, 38px);
    background: linear-gradient(120deg, var(--gold), var(--rose), var(--gold));
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmerText 2.5s linear infinite;
    margin-bottom: 6px;
  }
  @keyframes shimmerText {
    to { background-position: 200% center; }
  }

  .bday-date {
    font-family: 'Tenor Sans', serif;
    font-size: 13px;
    letter-spacing: 0.4em;
    color: var(--teal);
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0.85;
  }

  .bday-message {
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    line-height: 1.8;
    color: rgba(255,255,255,0.72);
    font-weight: 300;
  }

  .bday-message strong {
    color: var(--rose);
    font-weight: 600;
  }

  /* DIVIDER */
  .divider {
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 20px auto;
    opacity: 0.4;
  }

  /* DATE COUNTDOWN */
  .countdown-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .countdown-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 62px;
    padding: 12px 10px;
    border-radius: 14px;
    background: rgba(255,215,0,0.07);
    border: 1px solid rgba(255,215,0,0.18);
  }
  .countdown-num {
    font-family: 'Cinzel Decorative', serif;
    font-size: 26px;
    color: var(--gold);
    line-height: 1;
    min-width: 2ch;
    text-align: center;
  }
  .countdown-label {
    font-family: 'Tenor Sans', serif;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
  }

  /* BIRTHDAY indicator */
  .bday-today-msg {
    display: none;
    font-family: 'Cinzel Decorative', serif;
    font-size: 22px;
    background: linear-gradient(90deg, var(--gold), var(--rose), var(--teal));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: nameGlow 1.5s ease-in-out infinite alternate, shimmerText 2s linear infinite;
    text-align: center;
    margin-top: 16px;
  }

  /* RIZZ LIVE BADGE */
  .platform-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 40px;
    background: linear-gradient(135deg, rgba(255,77,139,0.15), rgba(155,89,182,0.15));
    border: 1px solid rgba(255,77,139,0.3);
    animation: fadeIn 1s ease 1.4s both;
  }
  .platform-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--rose);
    animation: livePulse 1.5s ease-in-out infinite;
  }
  @keyframes livePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,77,139,0.7); }
    50% { box-shadow: 0 0 0 6px rgba(255,77,139,0); }
  }
  .platform-text {
    font-family: 'Tenor Sans', serif;
    font-size: 12px;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
  }
  .platform-name {
    font-family: 'Cinzel Decorative', serif;
    font-size: 13px;
    color: var(--rose);
    font-weight: 700;
  }

  /* WISH BUTTON */
  .wish-btn {
    margin-top: 8px;
    padding: 14px 38px;
    border-radius: 40px;
    border: none;
    cursor: pointer;
    font-family: 'Cinzel Decorative', serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    background: linear-gradient(135deg, var(--rose), var(--violet));
    color: #fff;
    box-shadow: 0 4px 30px rgba(255,77,139,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeIn 1s ease 1.6s both;
    position: relative;
    overflow: hidden;
  }
  .wish-btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%);
    animation: btnShimmer 2.5s linear infinite;
  }
  @keyframes btnShimmer {
    from { transform: translateX(-100%) rotate(45deg); }
    to   { transform: translateX(100%) rotate(45deg); }
  }
  .wish-btn:hover {
    transform: scale(1.05) translateY(-2px);
    box-shadow: 0 8px 40px rgba(255,77,139,0.55);
  }
  .wish-btn:active {
    transform: scale(0.97);
  }

  /* Burst emojis on click */
  .burst {
    position: fixed;
    font-size: 28px;
    pointer-events: none;
    z-index: 999;
    animation: burstAnim 1s ease forwards;
  }
  @keyframes burstAnim {
    0%   { opacity: 1; transform: scale(0.5) translate(0,0); }
    100% { opacity: 0; transform: scale(1.5) translate(var(--dx), var(--dy)); }
  }

  /* FOOTER */
  .footer {
    font-family: 'Tenor Sans', serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    text-align: center;
    animation: fadeIn 1s ease 2s both;
  }
</style>
</head>
